        # Ocean forecast history files (2 files: 24hr averages at f024 and f048)
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/ocean/history/gefs.t{{ cyc }}z.24hr_avg.f024.nc, {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/ocean/history/gefs.t{{ cyc }}z.24hr_avg.f024.nc]
