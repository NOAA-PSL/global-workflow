        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.sfc.f024.nc, {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.sfc.f024.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.atm.f030.nc, {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.atm.f030.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.sfc.f030.nc, {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.sfc.f030.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.atm.f036.nc, {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.atm.f036.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.sfc.f036.nc, {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.sfc.f036.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.atm.f042.nc, {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.atm.f042.nc]
