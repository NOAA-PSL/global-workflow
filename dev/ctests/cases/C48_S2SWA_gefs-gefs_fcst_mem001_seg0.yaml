{% set H_offset = '-6H' %}
{% set H_timedelta = H_offset | to_timedelta %}
{% set TEST_DATE_offset = TEST_DATE | add_to_datetime(H_timedelta) %}

{% set cyc = TEST_DATE | strftime('%H') %}
{% set cyc_offset = TEST_DATE_offset | strftime('%H') %}

{% set PDY = TEST_DATE | to_YMD %}
{% set PDY_offset = TEST_DATE_offset | to_YMD %}
{% set SRC_DIR = STAGED_CTESTS + '/COMROOT/' + PSLOT %}
{% set DST_DIR = RUNTESTS + '/COMROOT/' + TEST_NAME %}

input_files:
    mkdir:
        - {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input
        - {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input
        - {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/wave/prep
        - {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc_offset }}/mem001/model/ice/restart
        - {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc_offset }}/mem001/model/ocean/restart
        - {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc_offset }}/mem001/model/wave/restart

    copy:
        # Atmosphere initial conditions (13 files)
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/gfs_ctrl.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/gfs_ctrl.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/gfs_data.tile1.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/gfs_data.tile1.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/gfs_data.tile2.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/gfs_data.tile2.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/gfs_data.tile3.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/gfs_data.tile3.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/gfs_data.tile4.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/gfs_data.tile4.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/gfs_data.tile5.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/gfs_data.tile5.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/gfs_data.tile6.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/gfs_data.tile6.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/sfc_data.tile1.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/sfc_data.tile1.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/sfc_data.tile2.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/sfc_data.tile2.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/sfc_data.tile3.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/sfc_data.tile3.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/sfc_data.tile4.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/sfc_data.tile4.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/sfc_data.tile5.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/sfc_data.tile5.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/sfc_data.tile6.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/input/sfc_data.tile6.nc]

        # Ice restart (1 file) - from 06Z cycle
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc_offset }}/mem001/model/ice/restart/{{ PDY }}.{{ cyc }}0000.cice_model.res.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc_offset }}/mem001/model/ice/restart/{{ PDY }}.{{ cyc }}0000.cice_model.res.nc]

        # Ocean restart (1 file) - from 06Z cycle
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc_offset }}/mem001/model/ocean/restart/{{ PDY }}.{{ cyc }}0000.MOM.res.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc_offset }}/mem001/model/ocean/restart/{{ PDY }}.{{ cyc }}0000.MOM.res.nc]

        # Wave restart (1 file) - from 06Z cycle
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc_offset }}/mem001/model/wave/restart/{{ PDY }}.{{ cyc }}0000.restart.ww3,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc_offset }}/mem001/model/wave/restart/{{ PDY }}.{{ cyc }}0000.restart.ww3]

        # Wave prep file (1 file) - from 12Z cycle
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/wave/prep/gefs.t{{ cyc }}z.mod_def.glo_500.bin,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/wave/prep/gefs.t{{ cyc }}z.mod_def.glo_500.bin]

        # Chemistry input files (NEXUS diagnostics for aerosol emissions)
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/NEXUS_DIAG.20210323.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/NEXUS_DIAG.20210323.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/NEXUS_DIAG.20210324.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/NEXUS_DIAG.20210324.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/NEXUS_DIAG.20210325.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/NEXUS_DIAG.20210325.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/NEXUS_DIAG.20210326.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/NEXUS_DIAG.20210326.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/NEXUS_DIAG.20210327.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/NEXUS_DIAG.20210327.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/NEXUS_DIAG.20210328.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/NEXUS_DIAG.20210328.nc]

        # Fire emissions input files
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210322.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210322.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210323.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210323.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210324.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210324.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210325.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210325.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210326.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210326.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210327.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210327.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210328.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210328.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210329.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210329.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210330.nc,
           {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/chem/input/FIRE_EMIS_20210330.nc]

output_files:
    cmpfiles:
        # Atmosphere forecast history files (18 files: atmf + sfcf at f000-f048 every 6 hours)
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.atm.f000.nc, {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.atm.f000.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.sfc.f000.nc, {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.sfc.f000.nc]
        - [{{ SRC_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.atm.f006.nc, {{ DST_DIR }}/gefs.{{ PDY }}/{{ cyc }}/mem001/model/atmos/history/gefs.t{{ cyc }}z.atm.f006.nc]
