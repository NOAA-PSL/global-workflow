base:
  USE_AERO_ANL: "YES"
  AERO_ANL_RUNS: "gcdas"
  DOIAU: "NO"
  DO_JEDIATMVAR: "NO"
  DO_JEDIATMENS: "NO"
  DO_JEDIOCNVAR: "NO"
  DO_JEDISNOWDA: "NO"
  DO_MERGENSST: "NO"
  DO_STARTMEM_FROM_JEDIICE: "NO"
  DO_GOES: "NO"
  DO_BUFRSND: "NO"
  DO_GEMPAK: "NO"
  DO_AWIPS: "NO"
  DO_NPOESS: "NO"
  DO_TRACKER: "NO"
  DO_GENESIS: "NO"
  DO_GENESIS_FSU: "NO"
  DO_METP: "NO"
  FHMAX_GFS: 120
  FHMAX_HF_GFS: 0
  FCST_BREAKPOINTS: ""
  DO_GSISOILDA: "NO"
  DO_LAND_IAU: ".false."
  EUPD_CYC: "gfs"
  FHMAX_ENKF_GFS: 12
  DOHYBVAR_OCN: "NO"
  DOLETKF_OCN: "NO"
  DO_TEST_MODE: "NO"
  DO_IAU: "NO"
  DOHYBVAR: "NO"
  DO_LETKF: "NO"
  NMEM_ENS: 0
  l4densvar: ".false."
  assim_freq: 6
  FHMAX: 9
  FHOUT_AERO: 3

atmanl:
  STATICB_TYPE: "gsibec"
  LAYOUT_X_ATMANL: 8
  LAYOUT_Y_ATMANL: 8
  IO_LAYOUT_X: 1
  IO_LAYOUT_Y: 1
  OBS_LIST_YAML: "${PARMgfs}/gdas/atm/atm_obs_list.yaml.j2"
  VAR_JEDI_TEST_YAML: ""
  FV3INC_JEDI_TEST_YAML: ""

atmensanl:
  LAYOUT_X_ATMENSANL: 8
  LAYOUT_Y_ATMENSANL: 8
  IO_LAYOUT_X: 1
  IO_LAYOUT_Y: 1
  OBS_LIST_YAML: "${PARMgfs}/gdas/atm/atm_obs_list.yaml.j2"
  LETKF_JEDI_TEST_YAML: ""
  OBS_JEDI_TEST_YAML: ""
  SOL_JEDI_TEST_YAML: ""
  FV3INC_JEDI_TEST_YAML: ""

aeroanl:
  IO_LAYOUT_X: 1
  IO_LAYOUT_Y: 1

snowanl:
  IO_LAYOUT_X: 1
  IO_LAYOUT_Y: 1

marineanl:
  SOCA_INPUT_FIX_DIR: "${FIXgfs}/gdas/soca/72x35x25/soca"
  SOCA_ANL_GEOM: "${FIXgfs}/gdas/soca/72x35x25/soca"
  SOCA_OBS_LIST: "${PARMgfs}/gdas/marine/obs/obs_list.yaml"  # TODO: This is also repeated in oceanprepobs
  SOCA_NINNER: 100
  JCB_ALGO_YAML_VAR: "${PARMgfs}/gdas/marine/marine-jcb-3dfgat.yaml.j2"

prepoceanobs:
  SOCA_INPUT_FIX_DIR: "${FIXgfs}/gdas/soca/72x35x25/soca"
  SOCA_OBS_LIST: "${PARMgfs}/gdas/marine/obs/obs_list.yaml"  # TODO: This is also repeated in ocnanal
  OBSPREP_YAML: "${PARMgfs}/gdas/marine/obsprep/obsprep_config.yaml"
  use_exp_obs: "YES"
  dmpdir_exp: "${BASE_DATA}/experimental_obs"

fcst:
  CHECK_LAND_RESTART_OROG: "YES"

# config.aero has just a system-specific path to add.
# This is handled by the setup_expt.py, but it has to be told to write to it.
aero: {}
