# EMC-Bot Badge Updater Pipeline
# This pipeline is designed to be triggered by webhooks when other pipelines complete
# It handles updating GitHub Gists with pipeline status badges for NOAA's Global Workflow

stages:
  - update_badges

update_all_badges:
  image: bitnami/git:latest
  stage: update_badges
  script:
    - |
      # Install GitHub CLI and other required tools
      apt-get update -qq && apt-get install -y -qq curl jq
      curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
      chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
      apt-get update -qq && apt-get install -y -qq gh
      
      # Authenticate GitHub CLI
      echo "$GITHUB_TOKEN" | gh auth login --with-token
      
      # Create a temporary directory for badges
      mkdir -p badges
      
      # Get information about the triggering pipeline
      echo "Processing pipeline event data..."
      PIPELINE_PROJECT_ID="${CI_PIPELINE_SOURCE_PROJECT_ID:-none}"
      PIPELINE_BRANCH="${CI_PIPELINE_SOURCE_BRANCH:-develop}"
      
      # Default to global-workflow project if not specified
      if [ "$PIPELINE_PROJECT_ID" == "none" ]; then
        PROJECT_PATH="NWS/Operations/NCEP/EMC/global-workflow"
      else
        # You could look up the project path from the ID if needed
        PROJECT_PATH="NWS/Operations/NCEP/EMC/global-workflow"
      fi
      
      # Update main develop branch pipeline badge
      echo "Updating develop branch badge..."
      curl -L "https://vlab.noaa.gov/gitlab-licensed/${PROJECT_PATH}/badges/${PIPELINE_BRANCH}/pipeline.svg" -o "badges/main_pipeline.svg"
      gh gist edit "ab937691224bdf50427cbeca666bf67b" "badges/main_pipeline.svg"
      
      # Update machine-specific badges
      # These badges enhance visibility into the operational status of the global weather modeling system
      # across NOAA's high-performance computing environments
      
      # HERA - NOAA Research HPC
      echo "Updating HERA badge..."
      curl -L "https://vlab.noaa.gov/gitlab-licensed/${PROJECT_PATH}/badges/${PIPELINE_BRANCH}/pipeline.svg?job=build-hera" -o "badges/hera_badge.svg"
      gh gist edit "hera_gist_id" "badges/hera_badge.svg"
      
      # GAEA-C6 - Department of Energy HPC at Oak Ridge
      echo "Updating GAEA-C6 badge..."
      curl -L "https://vlab.noaa.gov/gitlab-licensed/${PROJECT_PATH}/badges/${PIPELINE_BRANCH}/pipeline.svg?job=build-gaeac6" -o "badges/gaeac6_badge.svg"
      gh gist edit "gaeac6_gist_id" "badges/gaeac6_badge.svg"
      
      # WCOSS2 - NOAA Operational Weather and Climate Supercomputing System
      echo "Updating WCOSS2 badge..."
      curl -L "https://vlab.noaa.gov/gitlab-licensed/${PROJECT_PATH}/badges/${PIPELINE_BRANCH}/pipeline.svg?job=build-wcoss2" -o "badges/wcoss2_badge.svg"
      gh gist edit "wcoss2_gist_id" "badges/wcoss2_badge.svg"
      
      # ORION - Navy HPC system
      echo "Updating ORION badge..."
      curl -L "https://vlab.noaa.gov/gitlab-licensed/${PROJECT_PATH}/badges/${PIPELINE_BRANCH}/pipeline.svg?job=build-orion" -o "badges/orion_badge.svg"
      gh gist edit "orion_gist_id" "badges/orion_badge.svg"
      
      # Add future HPC systems here as they're integrated into the workflow
      # This modular design allows for easy extension as computational resources expand
      
      echo "All badges updated successfully!"
  variables:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # This allows the job to run even if GitLab can't access the gists for verification
  allow_failure: true
  
  # Only run this when triggered by a webhook or manually
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "web"
