    machine: orion
  tags:
    - orion
  rules:
    - if: ($CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "trigger") && ($RUN_ON_MACHINES =~ /\borion\b|all/)
    - when: never  # Prevent pipeline from running on any other event (e.g., merges to develop)

build-hercules:
  extends: .build_template
  variables:
    machine: hercules
  tags:
    - hercules
  rules:
    - if: ($CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "trigger") && ($RUN_ON_MACHINES =~ /\bhercules\b|all/)

build-ursa:
  extends: .build_template
  variables:
    machine: ursa
  tags:
    - ursa
  rules:
    - if: ($CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "trigger") && ($RUN_ON_MACHINES =~ /\bursa\b|all/)
