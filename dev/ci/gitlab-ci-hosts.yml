# ==========================================================================
# Host-Specific Configurations for the global-workflow CI Pipeline
# ==========================================================================
#
# This file defines host-specific job configurations for different computing
# platforms supported by the global-workflow testing pipeline. It's designed
# to be easily extendable with new computing platforms.
#
# Key features:
# - Per-host test case matrices that define which tests run on which hosts
# - Includes two sections supporting the standard PR Cases and CTests
# - Host-specific tags and variables for job routing to the correct runners
# - Conditional rules based on trigger type (PR vs trigger)
#
# The CI_PIPELINE_SOURCE variable (set by GitLab) is when the pipeline is triggered
# by a GitHub action. This is used to determine whether to run CTests (trigger) or
# standard cases (!trigger).

# =======================================
# Standard Cases configurations by host
# =======================================

# Template matrices for case lists
.hera_cases_matrix: &hera_cases
  - caseName: ["C48mx500_hybAOWCDA", "C96C48_hybatmDA", "C48_S2SWA_gefs", "C96C48_hybatmsnowDA", "C48_S2SW", "C96_atm3DVar", "C48_ATM", "C96mx100_S2S", "C48mx500_3DVarAOWCDA", "C96_gcafs_cycled"]

.gaeac6_cases_matrix: &gaeac6_cases
  - caseName: ["C48mx500_hybAOWCDA", "C96C48_hybatmDA", "C48_S2SWA_gefs", "C96C48_hybatmsnowDA", "C48_S2SW", "C96_atm3DVar", "C48_ATM", "C48mx500_3DVarAOWCDA", "C96_gcafs_cycled"]

# Host: Hera - Standard Cases
setup_experiments-hera:
  extends: .setup_experiment_template
  variables:
    machine: hera
  tags:
      - hera
  parallel:
    matrix: *hera_cases
  needs:
    - build-hera
  rules:
    - if: $PIPELINE_TYPE == "pr_cases" && ($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "schedule") && ($RUN_ON_MACHINES =~ /\bhera\b|all/)

run_experiments-hera:
  extends: .run_experiments_template
  variables:
    machine: hera
  tags:
    - hera
  parallel:
    matrix: *hera_cases
  needs:
    - setup_experiments-hera
  rules:
    - if: $PIPELINE_TYPE == "pr_cases" && ($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "schedule") && ($RUN_ON_MACHINES =~ /\bhera\b|all/)

# Host: GAEAC6 - Standard Cases
setup_experiments-gaeac6:
  extends: .setup_experiment_template
  variables:
    machine: gaeac6
  tags:
    - gaeac6
  parallel:
    matrix: *gaeac6_cases
  needs:
    - build-gaeac6
  rules:
    - if: $PIPELINE_TYPE == "pr_cases" && ($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "schedule") && ($RUN_ON_MACHINES =~ /\bgaeac6\b|all/)

run_experiments-gaeac6:
  extends: .run_experiments_template
  variables:
    machine: gaeac6
  tags:
    - gaeac6
  parallel:
    matrix: *gaeac6_cases
  needs:
    - setup_experiments-gaeac6
  rules:
    - if: $PIPELINE_TYPE == "pr_cases" && ($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "schedule") && ($RUN_ON_MACHINES =~ /\bgaeac6\b|all/)

# Host: Hera - Finalize
finalize-hera:
  extends: .finalize_template
  variables:
    machine: hera
  tags:
    - hera
  needs:
    - run_experiments-hera
  rules:
    - if: $PIPELINE_TYPE == "pr_cases" && ($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "schedule") && ($RUN_ON_MACHINES =~ /\bhera\b|all/)

# Host: Gaea C6 - Finalize
finalize-gaeac6:
  extends: .finalize_template
  variables:
    machine: gaeac6
  tags:
    - gaeac6
  needs:
    - run_experiments-gaeac6
  rules:
    - if: $PIPELINE_TYPE == "pr_cases" && ($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "schedule") && ($RUN_ON_MACHINES =~ /\bgaeac6\b|all/)

# =======================================
# CTests configurations by host
# =======================================

# Template for CTest jobs that will be used across machines
.ctests_cases_template:
  extends: .run_ctests_template
  stage: run_tests
  parallel:
    matrix:
      - CTEST_NAME: ['C48_ATM_gfs_fcst_seg0', 'C48_S2SW_gfs_fcst_seg0']

# Host-specific CTest setup jobs
setup_ctests-hera:
  extends: .setup_ctests_template
  stage: setup_tests
  tags:
    - hera
  variables:
    machine: hera
  needs:
    - build-hera
  rules:
    - if: $PIPELINE_TYPE == "ctests" && ($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "schedule") && ($RUN_ON_MACHINES =~ /\bhera\b|all/)

setup_ctests-gaeac6:
  extends: .setup_ctests_template
  stage: setup_tests 
  tags:
    - gaeac6
  variables:
    machine: gaeac6
  needs:
    - build-gaeac6
  rules:
    - if: $PIPELINE_TYPE == "ctests" && ($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "schedule") && ($RUN_ON_MACHINES =~ /\bgaeac6\b|all/)

# Host: Hera - CTests
run_ctests-hera:
  extends: .ctests_cases_template
  tags:
    - hera
  needs:
    - setup_ctests-hera
  rules:
    - if: $PIPELINE_TYPE == "ctests" && ($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "schedule") && ($RUN_ON_MACHINES =~ /\bhera\b|all/)

# Host: GAEAC6 - CTests
run_ctests-gaeac6:
  extends: .ctests_cases_template
  tags:
    - gaeac6
  needs:
    - setup_ctests-gaeac6
  rules:
    - if: $PIPELINE_TYPE == "ctests" && ($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "schedule") && ($RUN_ON_MACHINES =~ /\bgaeac6\b|all/)

# =======================================
# Common build configurations by host
# These will always be included, regardless of modality
# =======================================

build-hera:
  extends: .build_template
  variables:
    machine: hera
  tags:
    - hera
  rules:
    - if: ($CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "trigger") && ($RUN_ON_MACHINES =~ /\bhera\b|all/)
    - when: never  # Prevent pipeline from running on any other event (e.g., merges to develop)

build-gaeac6:
  extends: .build_template
  variables:
    machine: gaeac6
  tags:
    - gaeac6
  rules:
    - if: ($CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "trigger") && ($RUN_ON_MACHINES =~ /\bgaeac6\b|all/)
    - when: never  # Prevent pipeline from running on any other event (e.g., merges to develop)
