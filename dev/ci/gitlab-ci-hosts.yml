# ==========================================================================
# Host-Specific Configurations for the global-workflow CI Pipeline
# ==========================================================================
#
# This file defines host-specific job configurations for different computing
# platforms supported by the global-workflow testing pipeline. It's designed
# to be easily extendable with new computing platforms.
#
# Key features:
# - Per-host test case matrices that define which tests run on which hosts
# - Includes two sections supporting the standard PR Cases and CTests
# - Host-specific tags and variables for job routing to the correct runners
# - Conditional rules based on trigger type (PR vs trigger)
#
# The CI_PIPELINE_SOURCE variable (set by GitLab) is when the pipeline is triggered
# by a GitHub action. This is used to determine whether to run CTests (trigger) or
# standard cases (!trigger).

# =======================================
# Standard Cases configurations by host
# =======================================

# Host: Hera - Standard Cases
setup_experiments-hera:
  extends: .setup_template
  variables:
    machine: hera
  tags:
      - hera
  parallel:
    matrix:
      - caseName: ["C48mx500_hybAOWCDA", "C96C48_hybatmDA", "C48_S2SWA_gefs", "C96C48_hybatmsnowDA", "C48_S2SW", "C96_atm3DVar", "C48_ATM", "C96mx100_S2S", "C48mx500_3DVarAOWCDA", "C96_gcafs_cycled"]
  needs:
    - build-hera
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

run_tests-hera:
  extends: .run_tests_template
  variables:
    machine: hera
  tags:
    - hera
  parallel:
    matrix:
      - caseName: ["C48mx500_hybAOWCDA", "C96C48_hybatmDA", "C48_S2SWA_gefs", "C96C48_hybatmsnowDA", "C48_S2SW", "C96_atm3DVar", "C48_ATM", "C96mx100_S2S", "C48mx500_3DVarAOWCDA", "C96_gcafs_cycled"]
  needs:
    - setup_experiments-hera
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

# Host: GAEAC6 - Standard Cases
setup_experiments-gaeac6:
  extends: .setup_template
  variables:
    machine: gaeac6
  tags:
    - gaeac6
  parallel:
    matrix:
      - caseName: ["C48mx500_hybAOWCDA", "C96C48_hybatmDA", "C48_S2SWA_gefs", "C96C48_hybatmsnowDA", "C48_S2SW", "C96_atm3DVar", "C48_ATM", "C48mx500_3DVarAOWCDA", "C96_gcafs_cycled"]
  needs:
    - build-gaeac6
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

run_tests-gaeac6:
  extends: .run_tests_template
  variables:
    machine: gaeac6
  tags:
    - gaeac6
  parallel:
    matrix:
      - caseName: ["C48mx500_hybAOWCDA", "C96C48_hybatmDA", "C48_S2SWA_gefs", "C96C48_hybatmsnowDA", "C48_S2SW", "C96_atm3DVar", "C48_ATM", "C48mx500_3DVarAOWCDA", "C96_gcafs_cycled"]
  needs:
    - setup_experiments-gaeac6
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

# Host: Hera - Finalize
finalize-hera:
  extends: .finalize_template
  variables:
    machine: hera
  tags:
    - hera
  needs:
    - run_tests-hera
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_success  # Explicitly set to run only if all upstream jobs succeed
    - if: $CI_PIPELINE_SOURCE == "trigger"
      when: never

# Host: Gaea C6 - Finalize
finalize-gaeac6:
  extends: .finalize_template
  variables:
    machine: gaeac6
  tags:
    - gaeac6
  needs:
    - run_tests-gaeac6
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_success  # Explicitly set to run only if all upstream jobs succeed
    - if: $CI_PIPELINE_SOURCE == "trigger"
      when: never

# =======================================
# CTests configurations by host
# =======================================

# Template for CTest jobs that will be used across machines
.ctests_cases_template:
  extends: .run_ctests_template
  stage: run_tests
  parallel:
    matrix:
      - CTEST_NAME: ['C48_ATM_gfs_fcst_seg0', 'C48_S2SW_gfs_fcst_seg0']

# Host-specific CTest setup jobs
create_ctests-hera:
  extends: .create_ctests
  stage: create_experiments
  tags:
    - hera
  variables:
    machine: hera
  needs:
    - build-hera
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger" && ($RUN_ON_MACHINES =~ /\bhera\b|all/)

create_ctests-gaeac6:
  extends: .create_ctests
  stage: create_experiments
  tags:
    - gaeac6
  variables:
    machine: gaeac6
  needs:
    - build-gaeac6
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger" && ($RUN_ON_MACHINES =~ /\bgaeac6\b|all/)

# Host: Hera - CTests
run_ctests-hera:
  extends: .ctests_cases_template
  tags:
    - hera
  needs:
    - create_ctests-hera
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger" && ($RUN_ON_MACHINES =~ /\bhera\b|all/)

# Host: GAEAC6 - CTests
run_ctests-gaeac6:
  extends: .ctests_cases_template
  tags:
    - gaeac6
  needs:
    - create_ctests-gaeac6
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger" && ($RUN_ON_MACHINES =~ /\bgaeac6\b|all/)

# =======================================
# Common build configurations by host
# These will always be included, regardless of modality
# =======================================

build-hera:
  extends: .build_template
  variables:
    machine: hera
  tags:
    - hera
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "trigger" && $RUN_ON_MACHINES =~ /\bhera\b|^all$/i
    - when: never  # Prevent pipeline from running on any other event (e.g., merges to develop)

build-gaeac6:
  extends: .build_template
  variables:
    machine: gaeac6
  tags:
    - gaeac6
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "trigger" && $RUN_ON_MACHINES =~ /\bgaeac6\b|^all$/i
    - when: never  # Prevent pipeline from running on any other event (e.g., merges to develop)
