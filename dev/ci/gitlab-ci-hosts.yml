# =======================================
# Common build configurations by host
# These will always be included, regardless of modality
# =======================================

build-hera:
  extends: .build_template
  variables:
    machine: hera
  tags:
    - hera
  rules:
    - if: ($CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "trigger") && ($RUN_ON_MACHINES =~ /\bhera\b|all/)
    - when: never  # Prevent pipeline from running on any other event (e.g., merges to develop)

build-gaeac6:
  extends: .build_template
  variables:
    machine: gaeac6
  tags:
    - gaeac6
  rules:
    - if: ($CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "trigger") && ($RUN_ON_MACHINES =~ /\bgaeac6\b|all/)
    - when: never  # Prevent pipeline from running on any other event (e.g., merges to develop)

build-orion:
  extends: .build_template
