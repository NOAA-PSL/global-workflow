# ==========================================================================
# Templates for Standard Test Cases
# ==========================================================================
#
# This file defines templates for setting up and running experiment
# test cases found in dev/ci/cases/pr for the global-workflow project.
#
# These cases represent more comprehensive, end-to-end testing
# scenarios than the CTesting framework.
#
# Key templates:
# - .setup_template: Creates experiment directories based on case YAML files
# - .run_tests_template: Executes and validates the experiment workflows
# - .finalize_{state}_template: Handles success and failure reporting

# Template for experiment setup jobs
.setup_experiment_template:
  extends: .base_config
  stage: setup_tests
  script:
    - |
      export RUNTESTS="${RUNTESTS_DIR}"
      "${GW_HOMEgfs}/dev/ci/scripts/utils/ci_utils.sh" create_experiment "${GW_HOMEgfs}/dev/ci/cases/pr/${caseName}.yaml" "${CI_COMMIT_SHORT_SHA}-${CI_PIPELINE_ID}"
      exit $?

# Template for test execution jobs
.run_experiments_template:
  extends: .base_config
  stage: run_tests
  script:
    - |
      echo "Using build directory ${GW_HOMEgfs}"

      # TEMPORARY: Use custom Rocoto build with dryrun feature for testing
      # TODO: Remove this when upstream Rocoto PR is merged
      # Load platform-specific configuration first
      source "${GW_HOMEgfs}/dev/ci/platforms/config.${machine}"
      if [[ -n "${GFS_CI_ROCOTO_PATH:-}" && -d "${GFS_CI_ROCOTO_PATH}" ]]; then
        export PATH="${GFS_CI_ROCOTO_PATH}:${PATH}"
        echo "Using custom Rocoto build at: $(which rocotorun 2>/dev/null || echo 'NOT FOUND')"
      else
        echo "GFS_CI_ROCOTO_PATH not set or directory not found, using system Rocoto"
      fi

      pslot=$("${GW_HOMEgfs}/dev/ci/scripts/utils/ci_utils.sh" get_pslot "${RUNTESTS_DIR}" "${caseName}")
      "${GW_HOMEgfs}/dev/ci/scripts/run_check_gitlab_ci.sh" "${GW_RUN_PATH}" "${pslot}" global-workflow
      exit $? 

# Success finalize - runs when ALL case jobs succeed
.finalize_success_template:
  extends: .base_config
  stage: finalize

  script:
    - |
      Machine="${machine^}"
      if [[ "${GFS_CI_RUN_TYPE}" == "nightly" && "${CI_PIPELINE_SOURCE}" == "schedule" ]]; then
        echo "Nightly pipeline succeeded, updating stable symlink"
        cd "${CI_BUILDS_DIR}"
        rm -f stable
        ln -sf "${WORKSPACE_ID}" stable

        # Clean up old directories from this pipeline type except stable
        echo "Cleaning up old ${GFS_CI_RUN_TYPE} directories except stable"
        find "${CI_BUILDS_DIR}" -maxdepth 1 -type d -name "${GFS_CI_RUN_TYPE}*" \
          -not -path "$(readlink -f "${CI_BUILDS_DIR}/stable")" -exec rm -rf {} \; 2>/dev/null || true

        # Update GitHub badges for success of nightly pipelines
        echo "Updating develop branch badge for ${Machine} to indicate Passed nightly run with GIST ID ${badge_GIST_ID}"
        badge_img_file="${TMPDIR:-/tmp}/$(uuidgen)/${machine}_pipeline_badge.svg"
        mkdir -p "$(dirname "${badge_img_file}")"
        curl -sSL "https://img.shields.io/badge/${machine}_nightly-passed-brightgreen?style=flat-round&logo=gitlab" -o "${badge_img_file}"
        ${GH} gist edit "${badge_GIST_ID}" --add "${badge_img_file}"
      elif [[ "${GFS_CI_RUN_TYPE}" == "pr_cases" && "${PR_NUMBER}" != 0 ]]; then
        # Update GitHub labels for success of pr_cases with a PR number
        "${GH}" pr edit "${PR_NUMBER}" --repo "${GW_REPO_URL}" \
          --add-label "CI-${Machine}-Passed" --remove-label "CI-${Machine}-Running" || true
      fi


# Failure finalize - runs when ANY case job fails
.finalize_fail_template:
  extends: .base_config
  stage: finalize
  script:
    - |
      Machine="${machine^}"
      if [[ "${GFS_CI_RUN_TYPE}" == "pr_cases" && "${PR_NUMBER}" != 0 ]]; then
        echo "Updating GitHub labels for failure for Case runs with PR number ${PR_NUMBER}"
        "${GH}" pr edit "${PR_NUMBER}" --repo "${GW_REPO_URL}" \
          --add-label "CI-${Machine}-Failed" --remove-label "CI-${Machine}-Running" || true
      elif [[ "${GFS_CI_RUN_TYPE}" == "nightly" && "${CI_PIPELINE_SOURCE}" == "schedule" ]]; then
        echo "Updating develop branch badge for ${Machine} to indicate nightly Failed with GIST ID ${badge_GIST_ID}"
        badge_img_file="${TMPDIR:-/tmp}/$(uuidgen)/${machine}_pipeline_badge.svg"
        mkdir -p "$(dirname "${badge_img_file}")"
        curl -sSL "https://img.shields.io/badge/${machine}_nightly-failed-red?style=flat-round&logo=gitlab" -o "${badge_img_file}"
        ${GH} gist edit "${badge_GIST_ID}" --add "${badge_img_file}"
      fi
