host_override:  # over-ride options for host
  # Gaea must use the login nodes for builds
  GAEAC6:
    max_cores: 8
    walltime_ratio: 1.5  # Uniformly adjust the wallclock by this factor (builds are slower on head nodes)
    build:
      gdas:
        memory: "60G"
        cores: 8
        walltime: "02:30:00"
systems:
  common:
    - "ufs_utils"
    - "gfs_utils"
    - "upp"
  gfs:
    - "gfs_model"
    - "gfs_ww3prepost"
  gsi:
    - "gsi_enkf"
    - "gsi_utils"
    - "gsi_monitor"
  gdas:
    - "gdas"
    - "gsi_utils"
    - "gsi_monitor"
  gefs:
    - "gefs_model"
    - "gefs_ww3_prepost"
  sfs:
    - "sfs_model"
    - "gefs_ww3_prepost"
  gcafs:
    - "gcafs_model"
build:
  gfs_model:
    command: "./build_ufs.sh -e gfs_model.x"
    cores: 12
    walltime: "00:40:00"

  gfs_ww3prepost:
    command: "./build_ww3prepost.sh"
    cores: 4
    walltime: "00:15:00"

  gefs_model:
    command: "./build_ufs.sh -w -e gefs_model.x"
    cores: 12
    walltime: "00:40:00"

  gefs_ww3_prepost:
    command: "./build_ww3prepost.sh -w"
    cores: 4
    walltime: "00:15:00"

  sfs_model:
    command: "./build_ufs.sh -y -e sfs_model.x"
    cores: 12
    walltime: "00:50:00"

  gcafs_model:
    command: "./build_ufs.sh -a ATMAERO -e gcafs_model.x"
    cores: 12
    walltime: "00:40:00"

  upp:
    command: "./build_upp.sh"
    cores: 8
    walltime: "00:15:00"

  gsi_enkf:
    command: "./build_gsi_enkf.sh"
    cores: 8
    walltime: "00:20:00"

  gsi_monitor:
    command: "./build_gsi_monitor.sh"
    cores: 4
    walltime: "00:15:00"

  gsi_utils:
    command: "./build_gsi_utils.sh"
    cores: 6
    walltime: "00:15:00"

  ufs_utils:
    command: "./build_ufs_utils.sh"
    cores: 8
    walltime: "00:15:00"

  gfs_utils:
    command: "./build_gfs_utils.sh"
    cores: 6
    walltime: "00:15:00"

  gdas:
    command: "./build_gdas.sh"
    cores: 40
    walltime: "01:45:00"
