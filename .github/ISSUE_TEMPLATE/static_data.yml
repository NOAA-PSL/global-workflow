name: Static Data Update
description: Request static data be added or updated
labels: ["Static Data Mgmt"]
projects: ["NOAA-EMC/41"]
assignees:
  - DavidHuber-NOAA
  - TravisElless-NOAA

body:
  - type: markdown
    attributes:
      value: |
        **Process:**
        - Stage data on Ursa or WCOSS2
        - Make sure permissions are set properly (global read access)
        - CMs will push data and ask for verification

  - type: checkboxes
    attributes:
      label: Type of static data
      description: |
        - Fix: large static files needed to run global-workflow
        - Initial conditions: ICs needed to run one of global-workflow's included tests
        - Experimental data: Temporary datasets needed for development that will be replaced by other sources for operations (e.g. data that will be in DCOM)
      options:
        - label: "Fix"
        - label: "Initial conditions"
        - label: "Experimental data"
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Target directory
      options:
        - label: "Fix: aer"
        - label: "Fix: am"
        - label: "Fix: chem"
        - label: "Fix: cice"
        - label: "Fix: cpl"
        - label: "Fix: datm"
        - label: "Fix: gdas/aero"
        - label: "Fix: gdas/crtm"
        - label: "Fix: gdas/fv3jedi"
        - label: "Fix: gdas/gsibec"
        - label: "Fix: gdas/obs"
        - label: "Fix: gdas/snow"
        - label: "Fix: gdas/soca"
        - label: "Fix: gldas"
        - label: "Fix: glwu"
        - label: "Fix: gsi"
        - label: "Fix: lut"
        - label: "Fix: mom6"
        - label: "Fix: orog"
        - label: "Fix: raw"
        - label: "Fix: reg2grb2"
        - label: "Fix: sfc_climo"
        - label: "Fix: ugwd"
        - label: "Fix: verif"
        - label: "Fix: wave"
        - label: "Fix: *NEW*"
        - label: "ICs: C48/C48 mx500"
        - label: "ICs: C96/C48"
        - label: "ICs: C96 mx100"
        - label: "ICs: C384/C192"
        - label: "ICs: C384 mx025"
        - label: "ICs: C768 mx025"
        - label: "ICs: C1152 mx025"
        - label: "ICs: *NEW RESOLUTION*"
        - label: "Exp Data: Experimental obs"
        - label: "Exp Data: GOCART emissions"
        - label: "Exp Data: JEDI obs"
        - label: "Exp Data: *NEW*"
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Type of change
      options:
        - label: Update existing files (Version update needed)
        - label: Remove files (Version update needed)
        - label: Add new files to existing directory
        - label: Add new directory (Version update needed if fix)
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Any workflow changes needed?
      description: |
        ANY fix or IC change other than adding files will require at least a new version.
      options:
        - label: "No change needed"
        - label: "Fix/IC version update only"
        - label: "Fix/IC version update + additional changes"
        - label: "Non-version changes only"
    validations:
      required: true

  - type: textarea
    attributes:
      label: |
        Please list all related issues. If this request requires a workflow update (including a fix version update), please open a *separate* global-workflow issue to track the change.
      description: Please link any related issues
      placeholder: NOAA-EMC/repo#1234
    validations:
      required: false

  - type: textarea
    attributes:
      label: Pickup location
      description: |
        Please provide path(s) to the data on either Ursa or WCOSS.

        If this requires a version update, please provide a CLEAN copy of the *entire* directory, including the structure and unchanged files from current directory.

        If this is just adding additional files, you may provide just the new files. The directory structure should still match the target.
      placeholder: '/path/to/new/data'
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional information
      description: |
        Please provide any additional information needed for this request. If this is a new directory, please provide a short description and a point of contact.
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: Checklist for GW CM
      options:
        - label: (Providing user) Discuss needs with global-workflow developer assigned to request
        - label: (Global Workflow CM) Update data in "glopara"-managed space on supported platforms (see checklist below)
        - label: (Global Workflow CM - Fix only) Update "Fix File Management" [spreadsheet](https://docs.google.com/spreadsheets/d/1BeIvcz6TO3If4YCqkUK-oz_kGS9q2wTjwLS-BBemSEY/edit?usp=sharing)
        - label: (Developer) Make related workflow/component updates (if any)

  - type: checkboxes
    attributes:
      label: Checklist for GW CM Only -- Sync to supported platforms
      options:
        - label: WCOSS2
        - label: Gaea C6
        - label: Ursa
        - label: MSU
        - label: AWS
        - label: HPSS
