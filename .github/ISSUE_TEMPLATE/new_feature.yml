name: New Feature
description: New capability is desired
labels: ["triage"]
type: "feature"
projects: ["NOAA-EMC/41"]

body:
  - type: markdown
    attributes:
      value: |
        If your issue falls into one of the follow categories, please go back and use the appropriate template:
        - Something is wrong or broken
        - It is a request from NCO
        - It is initiating a production update
        - Files need to be updated in a directory managed by workflow CMs under "glopara"

        Please search on the [Issue tracker](https://github.com/NOAA-EMC/global-workflow/issues) to make sure there is not an already open issue for this new feature.  If so, please update the existing issue.

  - type: textarea
    id: description
    attributes:
      label: What new functionality do you need?
      description: |
        Provide a concise description of the problem to be addressed by this new feature. Please be clear what parts of the problem are considered to be in-scope and out-of-scope.

        Consider including:
          * What are the requirements for the new functionality?
          * Are there any links to related issues, discussions, or resources that provide additional context?
    validations:
      required: true

  - type: textarea
    id: criteria
    attributes:
      label: Acceptance Criteria
      description: |
        A checklist of criteria to be satisfied before this feature is considered complete.

        Examples:
          - Forecast with option X completes successfully
          - File X produced
          - Output unchanged
      placeholder: |
        - [ ] Criterion #1
        - [ ] Criterion #2
        - [ ] Criterion #3
    validations:
      required: false

  - type: textarea
    id: suggested_solution
    attributes:
      label: Suggest a solution (optional)
      placeholder: |
        Propose how this issue can be resolved.

        Things to address include:
          * Details of the technical implementation
          * Tradeoffs made in design decisions
          * Caveats and considerations for the future

          If there are multiple solutions, please present each one separately. Save comparisons for the very end.)"
    validations:
      required: false
